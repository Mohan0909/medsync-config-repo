# ===============================
# APPLICATION
# ===============================
spring.application.name=medsync-gateway

# Gateway runs on WebFlux (Netty)
spring.main.web-application-type=reactive

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===============================
# AUTH SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[0].filters[1]=CircuitBreaker=name=authCircuitBreaker,fallbackUri=forward:/fallback/auth

# ===============================
# DOCTOR SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://doctor-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# ===============================
# PATIENT SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[2].id=patient-service
spring.cloud.gateway.routes[2].uri=lb://patient-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/patients/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# ===============================
# APPOINTMENT SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[3].id=appointment-service
spring.cloud.gateway.routes[3].uri=lb://appointment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/appointments/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# ===============================
# FALLBACK ROUTE
# ===============================
spring.cloud.gateway.routes[4].id=auth-fallback
spring.cloud.gateway.routes[4].uri=forward:/fallback/auth
spring.cloud.gateway.routes[4].predicates[0]=Path=/fallback/auth

# ===============================
# GLOBAL CORS
# ===============================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# ===============================
# RESILIENCE4J (CIRCUIT BREAKER)
# ===============================
resilience4j.circuitbreaker.instances.authCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.authCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.authCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authCircuitBreaker.waitDurationInOpenState=10s

# TIME LIMITER
resilience4j.timelimiter.instances.authCircuitBreaker.timeoutDuration=10s

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
